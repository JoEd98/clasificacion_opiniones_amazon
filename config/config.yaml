name: clasificacion_opiniones_amazon

learning_rate: 0.00002
num_train_epochs: 10
weight_decay: 0.01

defaults:
  - _self_

hydra:
  run:
    dir: experimentos/${now:%Y-%m-%d}/${now:%H-%M-%S}

  sweep:
    dir: experimentos/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

  job:
    chdir: true